<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Timetable Allotter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <aside class="side" id="side">
      <div class="side__brand">
        <span class="side__mark" aria-hidden="true"></span>
        <div>
          <div class="side__title">Timetable</div>
          <div class="side__sub">Allotter</div>
        </div>
      </div>

      <nav class="nav" id="nav" aria-label="Sections">
        <button class="nav__item" data-view="setup" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg>
          <span>Setup</span>
        </button>
        <button class="nav__item" data-view="manual" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M5 1v7L3 6.5 1.7 8 6 13h6.5L14 8.5 13 5l-2-.5V2h-2v2H7V1z"/></svg>
          <span>Manual</span>
        </button>
        <button class="nav__item" data-view="auto" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M9 1 3 9h4l-1 6 6-8H8z"/></svg>
          <span>Auto</span>
        </button>
        <button class="nav__item" data-view="dashboard" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 14V8h3v6zM6.5 14V2h3v12zM11 14V5h3v9z"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav__item" data-view="export" type="button">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1v8M5 6l3 3 3-3M2 12v3h12v-3" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          <span>Export</span>
        </button>
      </nav>

      <div class="side__foot">
        <div class="side__actions">
          <button class="iconbtn" id="undoBtn" type="button" title="Undo (Ctrl+Z)" aria-label="Undo">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6 3 2 7l4 4M2.5 7H10a4 4 0 0 1 0 8H7" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          </button>
          <button class="iconbtn" id="redoBtn" type="button" title="Redo (Ctrl+Shift+Z)" aria-label="Redo">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M10 3l4 4-4 4M13.5 7H6a4 4 0 0 0 0 8h3" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          </button>
          <button class="iconbtn" id="themeBtn" type="button" title="Toggle theme" aria-label="Toggle theme">
            <svg class="ic-sun" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="3.2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6 13 13M13 3l-1.4 1.4M4.4 11.6 3 13" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
            <svg class="ic-moon" viewBox="0 0 16 16" aria-hidden="true"><path d="M13.5 9.5A6 6 0 0 1 6.5 2.5 6 6 0 1 0 13.5 9.5z"/></svg>
          </button>
        </div>
        <div class="side__note">Saved in this browser</div>
      </div>
    </aside>

    <main class="stage" id="stage" tabindex="-1"></main>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
